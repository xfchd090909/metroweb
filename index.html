<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro UI - 动态磁贴</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="start-screen">
        <header class="top-bar">
            <div class="brand">
                <h1>开始</h1>
                <div class="subtitle">Start Screen</div>
            </div>
            <div class="top-bar-right">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="搜索应用" aria-label="搜索">
                </div>
                <button id="themeToggle" class="theme-toggle" aria-label="切换主题">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="tile-grid" id="tileGrid">
            <!-- 磁贴将由 JavaScript 动态生成 -->
        </main>
    </div>

    <!-- 3D 翻转动画层 -->
    <div id="illusion-wrapper">
        <div id="illusion-card">
            <div class="illusion-face" id="illusion-front"></div>
            <div class="illusion-face" id="illusion-back"></div>
        </div>
    </div>

    <!-- 应用全屏层 -->
    <div id="app-layer" aria-hidden="true" tabindex="-1">
        <header class="app-header">
            <h2 class="app-title">
                <i class="app-title-icon" id="appIcon"></i>
                <span id="appTitle"></span>
            </h2>
            <button class="close-btn" id="closeBtn" aria-label="关闭应用">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </header>
        <div class="app-body" id="appBody"></div>
    </div>

    <!-- mini 磁贴弹窗层 -->
    <div id="mini-wrapper" aria-hidden="true">
        <div class="mini-overlay"></div>
        <div class="mini-card" id="miniCard">
            <div class="mini-header">
                <h3 id="miniTitle">即将转至外链</h3>
                <button class="mini-close-btn" id="miniCloseBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="mini-body" id="miniBody">
                <p id="miniSecurityInfo">您即将访问外部链接，请确认安全。</p>
                <div class="mini-link-area">
                    <span id="miniUrlDisplay">https://example.com</span>
                    <button id="miniCopyBtn" class="mini-copy-btn"><i class="fa-regular fa-copy"></i> 复制</button>
                </div>
                <button id="miniExpandBtn" class="mini-expand-btn">展开 <i class="fa-solid fa-chevron-down"></i></button>
                <div id="miniFullUrl" style="display:none; word-break:break-all;"></div>
                <div class="mini-actions">
                    <button id="miniVisitBtn" class="mini-visit-btn">继续访问</button>
                </div>
            </div>
        </div>
    </div>

    <div class="clock">
        <span class="time" id="clockTime">--:--</span>
        <span id="clockDate">--</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
